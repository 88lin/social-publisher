<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 260" width="1100" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020817"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="g1"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#8b5cf6" flood-opacity="0.4"/></filter>
    <filter id="g2"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#06b6d4" flood-opacity="0.4"/></filter>
    <filter id="g3"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#10b981" flood-opacity="0.4"/></filter>
    <filter id="g4"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#f59e0b" flood-opacity="0.4"/></filter>
    <filter id="g5"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#f43f5e" flood-opacity="0.4"/></filter>
    <filter id="g6"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#6366f1" flood-opacity="0.4"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1100" height="260" fill="url(#bg)" rx="14"/>
  <rect x="0" y="0" width="1100" height="3" fill="url(#accent)" opacity="0.85"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-family="'SF Pro Display', Arial, sans-serif" font-size="12" font-weight="700" fill="#475569" letter-spacing="4">FULL  PUBLISH  PIPELINE  ·  8  PHASES</text>

  <!-- Phase 0 -->
  <rect x="22" y="52" width="148" height="168" rx="12" fill="#0d2818" filter="url(#g3)"/>
  <rect x="22" y="52" width="148" height="168" rx="12" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <rect x="22" y="52" width="40" height="22" rx="12 0 8 0" fill="#059669" opacity="0.7"/>
  <text x="42" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#d1fae5">P0</text>
  <text x="96" y="98" text-anchor="middle" font-size="20">💾</text>
  <text x="96" y="118" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#6ee7b7">读取记忆</text>
  <text x="96" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">memory.md</text>
  <text x="96" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">历史经验</text>
  <text x="96" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">用户偏好</text>
  <text x="96" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">内容指纹</text>
  <text x="96" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">风控日志</text>

  <!-- Arrow 0→1 -->
  <line x1="170" y1="136" x2="192" y2="136" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 1+2 -->
  <rect x="192" y="52" width="148" height="168" rx="12" fill="#1e1b4b" filter="url(#g1)"/>
  <rect x="192" y="52" width="148" height="168" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <rect x="192" y="52" width="40" height="22" rx="12 0 8 0" fill="#7c3aed" opacity="0.7"/>
  <text x="212" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#ede9fe">P1-2</text>
  <text x="266" y="98" text-anchor="middle" font-size="20">🔍</text>
  <text x="266" y="118" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">解析 + 查找</text>
  <text x="266" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">平台推断</text>
  <text x="266" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">脚本路径</text>
  <text x="266" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">参数提取</text>
  <text x="266" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">图片处理</text>
  <text x="266" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">决策树</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="136" x2="362" y2="136" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3 -->
  <rect x="362" y="52" width="148" height="168" rx="12" fill="#0c2340" filter="url(#g2)"/>
  <rect x="362" y="52" width="148" height="168" rx="12" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <rect x="362" y="52" width="40" height="22" rx="12 0 8 0" fill="#0891b2" opacity="0.7"/>
  <text x="382" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#cffafe">P3</text>
  <text x="436" y="98" text-anchor="middle" font-size="20">✍️</text>
  <text x="436" y="118" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#67e8f9">内容生成</text>
  <text x="436" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">各平台独立</text>
  <text x="436" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">调性适配</text>
  <text x="436" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">违禁词替换</text>
  <text x="436" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">LLM 驱动</text>
  <text x="436" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">不互相复制</text>

  <!-- Arrow 3→3.5 -->
  <line x1="510" y1="136" x2="532" y2="136" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3.5 -->
  <rect x="532" y="52" width="148" height="168" rx="12" fill="#0c2340" filter="url(#g2)"/>
  <rect x="532" y="52" width="148" height="168" rx="12" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <rect x="532" y="52" width="40" height="22" rx="12 0 8 0" fill="#0891b2" opacity="0.7"/>
  <text x="552" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#cffafe">P3.5</text>
  <text x="606" y="98" text-anchor="middle" font-size="20">📝</text>
  <text x="606" y="118" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#67e8f9">内容评审</text>
  <text x="606" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">reviewer subagent</text>
  <text x="606" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">5 维度评分</text>
  <text x="606" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">≥70 放行</text>
  <text x="606" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">&lt;70 重写</text>
  <text x="606" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">最多 2 次</text>

  <!-- Arrow 3.5→4.5 -->
  <line x1="680" y1="136" x2="702" y2="136" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 4.5 -->
  <rect x="702" y="52" width="148" height="168" rx="12" fill="#1a0f2e" filter="url(#g1)"/>
  <rect x="702" y="52" width="148" height="168" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <rect x="702" y="52" width="40" height="22" rx="12 0 8 0" fill="#7c3aed" opacity="0.7"/>
  <text x="722" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#ede9fe">P4.5</text>
  <text x="776" y="98" text-anchor="middle" font-size="20">🛡️</text>
  <text x="776" y="118" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">风控评估</text>
  <text x="776" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">guard subagent</text>
  <text x="776" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">频率 · 规律性</text>
  <text x="776" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">多样性 · 行为</text>
  <text x="776" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">allow/delay</text>
  <text x="776" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">block 三态</text>

  <!-- Arrow 4.5→5 -->
  <line x1="850" y1="136" x2="872" y2="136" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 5+6+7+8 -->
  <rect x="872" y="52" width="200" height="168" rx="12" fill="#2d1b00" filter="url(#g4)"/>
  <rect x="872" y="52" width="200" height="168" rx="12" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <rect x="872" y="52" width="40" height="22" rx="12 0 8 0" fill="#d97706" opacity="0.7"/>
  <text x="892" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#fef3c7">P5-8</text>
  <text x="972" y="98" text-anchor="middle" font-size="20">🚀</text>
  <text x="972" y="118" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#fcd34d">执行 · 验证 · 报告</text>
  <text x="972" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">调用 Skill 脚本</text>
  <text x="972" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">平台间隔 15s</text>
  <text x="972" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">成功标志验证</text>
  <text x="972" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">表格报告输出</text>
  <text x="972" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">写入 memory.md</text>

  <!-- Bottom accent -->
  <rect x="0" y="253" width="1100" height="7" rx="0 0 14 14" fill="url(#accent)" opacity="0.5"/>
</svg>
