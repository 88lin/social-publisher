<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d0820"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2340"/>
      <stop offset="100%" style="stop-color:#071628"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2818"/>
      <stop offset="100%" style="stop-color:#071810"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b00"/>
      <stop offset="100%" style="stop-color:#1a1000"/>
    </linearGradient>
    <filter id="glow1"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a29bfe" flood-opacity="0.4"/></filter>
    <filter id="glow2"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#74b9ff" flood-opacity="0.4"/></filter>
    <filter id="glow3"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ecdc4" flood-opacity="0.4"/></filter>
    <filter id="glow4"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffd93d" flood-opacity="0.4"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="3">SCRAPLING ENHANCED PIPELINE</text>

  <!-- Step 1 -->
  <rect x="40" y="55" width="170" height="110" rx="10" fill="url(#step1)" filter="url(#glow1)"/>
  <rect x="40" y="55" width="170" height="110" rx="10" fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.7"/>
  <text x="125" y="82" text-anchor="middle" font-size="20">🔍</text>
  <text x="125" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#a29bfe">Step 1 · 页面预检</text>
  <text x="125" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">StealthyFetcher</text>
  <text x="125" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">反爬检测 + 可访问性</text>
  <text x="125" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">验证目标页面状态</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="110" x2="250" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="250" y="55" width="170" height="110" rx="10" fill="url(#step2)" filter="url(#glow2)"/>
  <rect x="250" y="55" width="170" height="110" rx="10" fill="none" stroke="#74b9ff" stroke-width="1.5" opacity="0.7"/>
  <text x="335" y="82" text-anchor="middle" font-size="20">🌐</text>
  <text x="335" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#74b9ff">Step 2 · 浏览器执行</text>
  <text x="335" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Playwright 自动化</text>
  <text x="335" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">真实操作 · 表单填写</text>
  <text x="335" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">模拟人工发布流程</text>

  <!-- Arrow 2→3 -->
  <line x1="420" y1="110" x2="460" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="460" y="55" width="170" height="110" rx="10" fill="url(#step3)" filter="url(#glow3)"/>
  <rect x="460" y="55" width="170" height="110" rx="10" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.7"/>
  <text x="545" y="82" text-anchor="middle" font-size="20">🎯</text>
  <text x="545" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4ecdc4">Step 3 · 自适应选择</text>
  <text x="545" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">find_similar 降级</text>
  <text x="545" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">多方法容错解析</text>
  <text x="545" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">网站变更自动适配</text>

  <!-- Arrow 3→4 -->
  <line x1="630" y1="110" x2="670" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="670" y="55" width="190" height="110" rx="10" fill="url(#step4)" filter="url(#glow4)"/>
  <rect x="670" y="55" width="190" height="110" rx="10" fill="none" stroke="#ffd93d" stroke-width="1.5" opacity="0.7"/>
  <text x="765" y="82" text-anchor="middle" font-size="20">🛡️</text>
  <text x="765" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffd93d">Step 4 · 增强容错</text>
  <text x="765" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">条件等待 + 自动重试</text>
  <text x="765" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">JS 降级兜底方案</text>
  <text x="765" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">详细日志 · 异常上报</text>

  <!-- Bottom accent -->
  <rect x="0" y="194" width="900" height="6" rx="0 0 12 12">
    <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#a29bfe"/>
      <stop offset="75%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:0"/>
    </linearGradient>
  </rect>
  <rect x="0" y="194" width="900" height="6" rx="0" fill="url(#bottomLine)" opacity="0.5"/>
</svg>
