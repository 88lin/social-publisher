<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <!-- Card gradients -->
    <linearGradient id="cardCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1e1040"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2340"/>
      <stop offset="100%" style="stop-color:#071628"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2818"/>
      <stop offset="100%" style="stop-color:#071810"/>
    </linearGradient>
    <linearGradient id="cardRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0f0f"/>
      <stop offset="100%" style="stop-color:#1a0808"/>
    </linearGradient>
    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#74b9ff"/>
    </linearGradient>
    <linearGradient id="arrowDown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#74b9ff"/>
    </linearGradient>
    <filter id="cardGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a29bfe" flood-opacity="0.3"/>
    </filter>
    <filter id="centerGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ffd93d" flood-opacity="0.4"/>
    </filter>
    <filter id="platformGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ecdc4" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a29bfe" opacity="0.8"/>
    </marker>
    <marker id="arrowheadDown" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#74b9ff" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" font-family="'SF Pro Display', Arial, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" letter-spacing="2">SYSTEM ARCHITECTURE</text>
  <rect x="380" y="50" width="240" height="1.5" rx="1" fill="url(#arrowGrad)" opacity="0.6"/>

  <!-- ===== TOP LAYER: AI Agent ===== -->
  <!-- Center orchestrator card -->
  <rect x="350" y="75" width="300" height="90" rx="14" fill="url(#cardCenter)" filter="url(#centerGlow)"/>
  <rect x="350" y="75" width="300" height="90" rx="14" fill="none" stroke="#ffd93d" stroke-width="1.5" opacity="0.7"/>
  <!-- Icon circle -->
  <circle cx="410" cy="120" r="24" fill="#ffd93d" opacity="0.12"/>
  <text x="410" y="128" text-anchor="middle" font-size="26">🤖</text>
  <!-- Text -->
  <text x="510" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffd93d">AI Agent 调度中心</text>
  <text x="510" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">OpenClaw · LLM 内容生成 · 任务编排</text>
  <text x="510" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">违禁词过滤 · 模板管理 · 日志追踪</text>

  <!-- ===== MIDDLE LAYER: Two engines ===== -->
  <!-- Playwright card -->
  <rect x="120" y="240" width="260" height="100" rx="14" fill="url(#cardBlue)" filter="url(#cardGlow)"/>
  <rect x="120" y="240" width="260" height="100" rx="14" fill="none" stroke="#74b9ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="175" cy="290" r="22" fill="#74b9ff" opacity="0.12"/>
  <text x="175" y="298" text-anchor="middle" font-size="22">🌐</text>
  <text x="295" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#74b9ff">Playwright</text>
  <text x="295" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">真实浏览器自动化</text>
  <text x="295" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Cookie 持久化 · 模拟人工操作</text>
  <text x="295" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">零风控检测</text>

  <!-- Scrapling card -->
  <rect x="620" y="240" width="260" height="100" rx="14" fill="url(#cardPurple)" filter="url(#cardGlow)"/>
  <rect x="620" y="240" width="260" height="100" rx="14" fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.7"/>
  <circle cx="675" cy="290" r="22" fill="#a29bfe" opacity="0.12"/>
  <text x="675" y="298" text-anchor="middle" font-size="22">🕷️</text>
  <text x="795" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#a29bfe">Scrapling</text>
  <text x="795" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">反爬预检 · 自适应选择器</text>
  <text x="795" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">StealthyFetcher · 增强重试</text>
  <text x="795" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">JS 降级兜底</text>

  <!-- ===== BOTTOM LAYER: 4 platforms ===== -->
  <!-- 闲鱼 -->
  <rect x="60" y="420" width="170" height="100" rx="12" fill="url(#cardRed)" filter="url(#platformGlow)"/>
  <rect x="60" y="420" width="170" height="100" rx="12" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
  <text x="145" y="452" text-anchor="middle" font-size="22">🐟</text>
  <text x="145" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ff6b6b">闲鱼</text>
  <text x="145" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">AI 配图 · 商品发布</text>
  <text x="145" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">违禁词过滤</text>

  <!-- 小红书 -->
  <rect x="260" y="420" width="170" height="100" rx="12" fill="url(#cardRed)" filter="url(#platformGlow)"/>
  <rect x="260" y="420" width="170" height="100" rx="12" fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.7"/>
  <text x="345" y="452" text-anchor="middle" font-size="22">📕</text>
  <text x="345" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ff4757">小红书</text>
  <text x="345" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">爆款标题 · 话题标签</text>
  <text x="345" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">图文上传</text>

  <!-- B站 -->
  <rect x="570" y="420" width="170" height="100" rx="12" fill="url(#cardBlue)" filter="url(#platformGlow)"/>
  <rect x="570" y="420" width="170" height="100" rx="12" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.7"/>
  <text x="655" y="452" text-anchor="middle" font-size="22">📺</text>
  <text x="655" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#4ecdc4">B站专栏</text>
  <text x="655" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">深度文章 · 自动排版</text>
  <text x="655" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">草稿管理</text>

  <!-- 抖音 -->
  <rect x="770" y="420" width="170" height="100" rx="12" fill="url(#cardPurple)" filter="url(#platformGlow)"/>
  <rect x="770" y="420" width="170" height="100" rx="12" fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.7"/>
  <text x="855" y="452" text-anchor="middle" font-size="22">🎵</text>
  <text x="855" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#a29bfe">抖音图文</text>
  <text x="855" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">短平快图文 · AI 配图</text>
  <text x="855" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">创作者中心直发</text>

  <!-- ===== ARROWS ===== -->
  <!-- AI Agent → Playwright (left diagonal) -->
  <line x1="420" y1="165" x2="280" y2="240" stroke="#74b9ff" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrowheadDown)"/>
  <!-- AI Agent → Scrapling (right diagonal) -->
  <line x1="580" y1="165" x2="720" y2="240" stroke="#a29bfe" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrowheadDown)"/>

  <!-- Playwright → 闲鱼 -->
  <line x1="185" y1="340" x2="155" y2="420" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowheadDown)"/>
  <!-- Playwright → 小红书 -->
  <line x1="235" y1="340" x2="330" y2="420" stroke="#ff4757" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowheadDown)"/>
  <!-- Scrapling → B站 -->
  <line x1="680" y1="340" x2="660" y2="420" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowheadDown)"/>
  <!-- Scrapling → 抖音 -->
  <line x1="750" y1="340" x2="840" y2="420" stroke="#a29bfe" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrowheadDown)"/>

  <!-- Playwright ↔ Scrapling (bidirectional) -->
  <line x1="380" y1="290" x2="620" y2="290" stroke="url(#arrowGrad)" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="500" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">协同增强</text>

  <!-- Layer labels -->
  <text x="28" y="130" font-family="Arial, sans-serif" font-size="10" fill="#64748b" transform="rotate(-90, 28, 130)">ORCHESTRATION</text>
  <text x="28" y="310" font-family="Arial, sans-serif" font-size="10" fill="#64748b" transform="rotate(-90, 28, 310)">ENGINE LAYER</text>
  <text x="28" y="490" font-family="Arial, sans-serif" font-size="10" fill="#64748b" transform="rotate(-90, 28, 490)">PLATFORMS</text>

  <!-- Layer separator lines -->
  <line x1="50" y1="210" x2="950" y2="210" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,6" opacity="0.8"/>
  <line x1="50" y1="390" x2="950" y2="390" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,6" opacity="0.8"/>

  <!-- Bottom border accent -->
  <rect x="0" y="553" width="1000" height="7" rx="0 0 16 16" fill="url(#arrowGrad)" opacity="0.5"/>
</svg>
