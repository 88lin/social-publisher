<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 700" width="1160" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020817"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Card fills -->
    <linearGradient id="cPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#1e1040;stop-opacity:0.55"/>
    </linearGradient>
    <linearGradient id="cBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2340;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#071628;stop-opacity:0.55"/>
    </linearGradient>
    <linearGradient id="cGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2818;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#071810;stop-opacity:0.55"/>
    </linearGradient>
    <linearGradient id="cTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2340;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#071628;stop-opacity:0.45"/>
    </linearGradient>
    <linearGradient id="cAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b00;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#1a1000;stop-opacity:0.55"/>
    </linearGradient>
    <filter id="fPurple"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#8b5cf6" flood-opacity="0.35"/></filter>
    <filter id="fBlue"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.35"/></filter>
    <filter id="fGreen"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#10b981" flood-opacity="0.35"/></filter>
    <filter id="fAmber"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f59e0b" flood-opacity="0.35"/></filter>
    <filter id="fRed"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f43f5e" flood-opacity="0.35"/></filter>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6" opacity="0.8"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4" opacity="0.8"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981" opacity="0.8"/>
    </marker>
    <marker id="arrA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b" opacity="0.8"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f43f5e" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1160" height="700" fill="url(#bg)" rx="16"/>
  <rect x="0" y="0" width="1160" height="3" fill="url(#accentH)" opacity="0.9"/>

  <!-- Title -->
  <text x="580" y="38" text-anchor="middle" font-family="'SF Pro Display', Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b" letter-spacing="4">AMPLIPOST  ·  MULTI-AGENT  ARCHITECTURE</text>
  <rect x="330" y="46" width="500" height="1" fill="url(#accentH)" opacity="0.35"/>

  <!-- ================================================================ -->
  <!-- USER INPUT (top) -->
  <!-- ================================================================ -->
  <rect x="430" y="62" width="300" height="44" rx="22" fill="#1e1b4b" filter="url(#fPurple)"/>
  <rect x="430" y="62" width="300" height="44" rx="22" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <text x="580" y="80" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#a5b4fc">👤 用户输入</text>
  <text x="580" y="97" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="10" fill="#64748b">「帮我发小红书，主题是 AI 工具推荐」</text>

  <!-- Arrow: user → coordinator -->
  <line x1="580" y1="106" x2="580" y2="138" stroke="#6366f1" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrP)"/>

  <!-- ================================================================ -->
  <!-- PHASE 0: Memory Read -->
  <!-- ================================================================ -->
  <!-- Memory node (left side) -->
  <rect x="60" y="148" width="160" height="80" rx="12" fill="url(#cGreen)" filter="url(#fGreen)"/>
  <rect x="60" y="148" width="160" height="80" rx="12" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.65"/>
  <text x="140" y="172" text-anchor="middle" font-size="18">💾</text>
  <text x="140" y="192" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#6ee7b7">memory.md</text>
  <text x="140" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">长期记忆 · 内容指纹</text>
  <text x="140" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">风控日志 · 用户偏好</text>

  <!-- ================================================================ -->
  <!-- COORDINATOR (center) -->
  <!-- ================================================================ -->
  <rect x="380" y="138" width="400" height="110" rx="14" fill="url(#cPurple)" filter="url(#fPurple)"/>
  <rect x="380" y="138" width="400" height="110" rx="14" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.75"/>
  <rect x="380" y="138" width="180" height="26" rx="14 0 8 0" fill="#7c3aed" opacity="0.75"/>
  <text x="470" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ede9fe" letter-spacing="1">content-coordinator</text>
  <text x="580" y="185" text-anchor="middle" font-size="20">🤖</text>
  <text x="580" y="207" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd">主 Agent · 全程调度</text>
  <text x="580" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">解析输入 · 生成内容 · 调度 subagent · 执行发布 · 汇报结果</text>

  <!-- Memory ↔ Coordinator arrows -->
  <line x1="220" y1="188" x2="380" y2="188" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.55" marker-end="url(#arrG)"/>
  <text x="300" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Phase 0 读取</text>

  <!-- ================================================================ -->
  <!-- HOOKS (right side) -->
  <!-- ================================================================ -->
  <rect x="940" y="148" width="180" height="80" rx="12" fill="url(#cAmber)" filter="url(#fAmber)"/>
  <rect x="940" y="148" width="180" height="80" rx="12" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.65"/>
  <text x="1030" y="172" text-anchor="middle" font-size="16">⚡</text>
  <text x="1030" y="192" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#fcd34d">Hooks 系统</text>
  <text x="1030" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">PreToolUse · PostToolUse</text>
  <text x="1030" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">违禁词 · emoji · 极限词</text>

  <!-- Coordinator ↔ Hooks -->
  <line x1="780" y1="188" x2="940" y2="188" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.55" marker-end="url(#arrA)"/>
  <text x="860" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">发布前后拦截</text>

  <!-- ================================================================ -->
  <!-- SUBAGENTS ROW -->
  <!-- ================================================================ -->
  <!-- Arrow: coordinator → subagents -->
  <line x1="480" y1="248" x2="340" y2="310" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.55" marker-end="url(#arrB)"/>
  <line x1="680" y1="248" x2="820" y2="310" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.55" marker-end="url(#arrP)"/>

  <!-- content-reviewer -->
  <rect x="160" y="310" width="360" height="110" rx="14" fill="url(#cBlue)" filter="url(#fBlue)"/>
  <rect x="160" y="310" width="360" height="110" rx="14" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <rect x="160" y="310" width="160" height="26" rx="14 0 8 0" fill="#0891b2" opacity="0.7"/>
  <text x="240" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#cffafe" letter-spacing="1">content-reviewer</text>
  <text x="340" y="358" text-anchor="middle" font-size="18">📝</text>
  <text x="340" y="378" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#67e8f9">独立内容质量评审</text>
  <text x="340" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">钩子强度 · 信息密度 · 真实感 · 平台适配 · 多样性</text>
  <text x="340" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">总分 &lt; 70 → 打回重写（最多 2 次）</text>

  <!-- publish-guard -->
  <rect x="640" y="310" width="360" height="110" rx="14" fill="url(#cPurple)" filter="url(#fPurple)"/>
  <rect x="640" y="310" width="360" height="110" rx="14" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <rect x="640" y="310" width="150" height="26" rx="14 0 8 0" fill="#7c3aed" opacity="0.7"/>
  <text x="715" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ede9fe" letter-spacing="1">publish-guard</text>
  <text x="820" y="358" text-anchor="middle" font-size="18">🛡️</text>
  <text x="820" y="378" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">发布风控守卫</text>
  <text x="820" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">发布频率 · 间隔规律性 · 内容多样性 · 账号行为</text>
  <text x="820" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">allow / delay / block 三态决策</text>

  <!-- Subagent return arrows -->
  <line x1="340" y1="420" x2="480" y2="468" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.45" marker-end="url(#arrB)"/>
  <line x1="820" y1="420" x2="680" y2="468" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.45" marker-end="url(#arrP)"/>
  <text x="390" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#06b6d4">评审报告 JSON</text>
  <text x="770" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6">风控决策 JSON</text>

  <!-- ================================================================ -->
  <!-- PLATFORM EXECUTION ROW -->
  <!-- ================================================================ -->
  <!-- Arrow: coordinator → platforms -->
  <line x1="580" y1="468" x2="580" y2="510" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3" opacity="0.6" marker-end="url(#arrP)"/>

  <!-- Platform row label -->
  <rect x="40" y="510" width="1080" height="120" rx="12" fill="#0d1117" opacity="0.6"/>
  <rect x="40" y="510" width="1080" height="120" rx="12" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.6"/>
  <rect x="40" y="510" width="130" height="26" rx="12 0 8 0" fill="#334155" opacity="0.8"/>
  <text x="105" y="527" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">发布执行层</text>

  <!-- 闲鱼 -->
  <rect x="65" y="546" width="220" height="68" rx="10" fill="#1a0a0a" filter="url(#fRed)"/>
  <rect x="65" y="546" width="220" height="68" rx="10" fill="none" stroke="#f43f5e" stroke-width="1.2" opacity="0.6"/>
  <text x="175" y="570" text-anchor="middle" font-size="16">🐟</text>
  <text x="175" y="590" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#fda4af">闲鱼</text>
  <text x="175" y="606" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">商品发布 · AI 配图 · 违禁词过滤</text>

  <!-- 小红书 -->
  <rect x="305" y="546" width="220" height="68" rx="10" fill="#1a0a0a" filter="url(#fRed)"/>
  <rect x="305" y="546" width="220" height="68" rx="10" fill="none" stroke="#f43f5e" stroke-width="1.2" opacity="0.6"/>
  <text x="415" y="570" text-anchor="middle" font-size="16">📕</text>
  <text x="415" y="590" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#fda4af">小红书</text>
  <text x="415" y="606" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">图文笔记 · 爆款标题 · 文字配图</text>

  <!-- B站 -->
  <rect x="545" y="546" width="220" height="68" rx="10" fill="#0a0f1a" filter="url(#fBlue)"/>
  <rect x="545" y="546" width="220" height="68" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.6"/>
  <text x="655" y="570" text-anchor="middle" font-size="16">📺</text>
  <text x="655" y="590" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#67e8f9">B站专栏</text>
  <text x="655" y="606" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">深度文章 · 自动排版 · 草稿管理</text>

  <!-- 抖音 -->
  <rect x="785" y="546" width="220" height="68" rx="10" fill="#0f0a1a" filter="url(#fPurple)"/>
  <rect x="785" y="546" width="220" height="68" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.6"/>
  <text x="895" y="570" text-anchor="middle" font-size="16">🎵</text>
  <text x="895" y="590" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">抖音图文</text>
  <text x="895" y="606" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">短平快 · AI 信息图 · 创作者直发</text>

  <!-- ================================================================ -->
  <!-- MEMORY WRITE (bottom) -->
  <!-- ================================================================ -->
  <!-- Return arrow: platforms → memory -->
  <path d="M 1060 580 Q 1110 580 1110 480 Q 1110 380 1110 280 Q 1110 188 940 188" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.45" marker-end="url(#arrG)"/>
  <text x="1118" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10b981" transform="rotate(90, 1118, 390)">Phase 8 写入记忆</text>

  <!-- Memory write arrow from coordinator -->
  <path d="M 380 210 Q 300 210 220 210" fill="none" stroke="#10b981" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.35" marker-end="url(#arrG)"/>

  <!-- ================================================================ -->
  <!-- OUTPUT (bottom) -->
  <!-- ================================================================ -->
  <rect x="430" y="648" width="300" height="36" rx="18" fill="#0d2818" filter="url(#fGreen)"/>
  <rect x="430" y="648" width="300" height="36" rx="18" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.6"/>
  <text x="580" y="662" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="11" font-weight="700" fill="#6ee7b7">✅ 发布完成报告</text>
  <text x="580" y="677" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">平台 · 状态 · 备注（表格形式）</text>

  <!-- Arrow: platforms → output -->
  <line x1="580" y1="630" x2="580" y2="648" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arrG)"/>

  <!-- Bottom accent -->
  <rect x="0" y="693" width="1160" height="7" rx="0 0 16 16" fill="url(#accentH)" opacity="0.55"/>
</svg>
