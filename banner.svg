<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020817"/>
      <stop offset="60%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <!-- Accent gradients -->
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="40%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <linearGradient id="ampGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Glow blobs -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="mblur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="titleGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#6366f1" flood-opacity="0.6"/>
    </filter>
    <filter id="subGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.5"/>
    </filter>
    <filter id="tagGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="150" rx="280" ry="220" fill="url(#blob1)" filter="url(#gblur)"/>
  <ellipse cx="1100" cy="260" rx="300" ry="240" fill="url(#blob2)" filter="url(#gblur)"/>
  <ellipse cx="640" cy="200" rx="350" ry="250" fill="url(#blob3)" filter="url(#mblur)"/>

  <!-- Fine grid -->
  <defs>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- Decorative rings top-right -->
  <circle cx="1180" cy="80" r="90" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
  <circle cx="1180" cy="80" r="60" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.25"/>
  <circle cx="1180" cy="80" r="30" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>

  <!-- Decorative rings bottom-left -->
  <circle cx="100" cy="340" r="70" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.2"/>
  <circle cx="100" cy="340" r="40" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.25"/>

  <!-- Diagonal accent lines -->
  <line x1="0" y1="0" x2="200" y2="400" stroke="url(#accentH)" stroke-width="0.5" opacity="0.15"/>
  <line x1="1280" y1="0" x2="1080" y2="400" stroke="url(#accentH)" stroke-width="0.5" opacity="0.15"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accentH)" opacity="0.9"/>

  <!-- Floating platform pills (left side) -->
  <!-- 闲鱼 -->
  <rect x="68" y="110" width="110" height="32" rx="16" fill="#6366f1" opacity="0.12"/>
  <rect x="68" y="110" width="110" height="32" rx="16" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="123" y="131" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#a5b4fc" font-weight="500">🐟 闲鱼</text>

  <!-- 小红书 -->
  <rect x="68" y="155" width="110" height="32" rx="16" fill="#f43f5e" opacity="0.1"/>
  <rect x="68" y="155" width="110" height="32" rx="16" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.45"/>
  <text x="123" y="176" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#fda4af" font-weight="500">📕 小红书</text>

  <!-- B站 -->
  <rect x="68" y="200" width="110" height="32" rx="16" fill="#06b6d4" opacity="0.1"/>
  <rect x="68" y="200" width="110" height="32" rx="16" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.45"/>
  <text x="123" y="221" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#67e8f9" font-weight="500">📺 B站</text>

  <!-- 抖音 -->
  <rect x="68" y="245" width="110" height="32" rx="16" fill="#8b5cf6" opacity="0.1"/>
  <rect x="68" y="245" width="110" height="32" rx="16" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.45"/>
  <text x="123" y="266" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#c4b5fd" font-weight="500">🎵 抖音</text>

  <!-- Connector dots from pills to center -->
  <line x1="178" y1="126" x2="340" y2="200" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="178" y1="171" x2="340" y2="200" stroke="#f43f5e" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="178" y1="216" x2="340" y2="200" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="178" y1="261" x2="340" y2="200" stroke="#8b5cf6" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Center node -->
  <circle cx="340" cy="200" r="18" fill="#6366f1" opacity="0.15"/>
  <circle cx="340" cy="200" r="18" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <circle cx="340" cy="200" r="6" fill="#6366f1" opacity="0.8"/>

  <!-- Main title: Ampli -->
  <text x="640" y="178" text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="96" font-weight="900" letter-spacing="-3"
    fill="url(#ampGrad)" filter="url(#titleGlow)">AmpliPost</text>

  <!-- Divider line -->
  <rect x="380" y="196" width="520" height="1.5" rx="1" fill="url(#accentH)" opacity="0.5"/>

  <!-- Subtitle CN -->
  <text x="640" y="232" text-anchor="middle"
    font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="300" fill="#94a3b8" letter-spacing="6">智能营销中台  ·  全平台内容自动分发</text>

  <!-- Tag pills row -->
  <!-- AI 内容生成 -->
  <rect x="348" y="262" width="108" height="26" rx="13" fill="url(#ampGrad)" opacity="0.15"/>
  <rect x="348" y="262" width="108" height="26" rx="13" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="402" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a5b4fc" font-weight="600" letter-spacing="0.5">AI 内容生成</text>

  <!-- 反爬增强 -->
  <rect x="468" y="262" width="96" height="26" rx="13" fill="#06b6d4" opacity="0.1"/>
  <rect x="468" y="262" width="96" height="26" rx="13" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <text x="516" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#67e8f9" font-weight="600" letter-spacing="0.5">反爬增强</text>

  <!-- 零风控 -->
  <rect x="576" y="262" width="80" height="26" rx="13" fill="#8b5cf6" opacity="0.1"/>
  <rect x="576" y="262" width="80" height="26" rx="13" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <text x="616" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c4b5fd" font-weight="600" letter-spacing="0.5">零风控</text>

  <!-- 一键分发 -->
  <rect x="668" y="262" width="80" height="26" rx="13" fill="#f43f5e" opacity="0.1"/>
  <rect x="668" y="262" width="80" height="26" rx="13" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.5"/>
  <text x="708" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fda4af" font-weight="600" letter-spacing="0.5">一键分发</text>

  <!-- 数据回流 -->
  <rect x="760" y="262" width="80" height="26" rx="13" fill="#10b981" opacity="0.1"/>
  <rect x="760" y="262" width="80" height="26" rx="13" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <text x="800" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6ee7b7" font-weight="600" letter-spacing="0.5">数据回流</text>

  <!-- Right side: stats -->
  <g transform="translate(1050, 130)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="36" font-weight="800" fill="#6366f1">4</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#64748b" dy="-8">大平台</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#475569" dy="8">全覆盖</text>
  </g>
  <line x1="1050" y1="148" x2="1180" y2="148" stroke="#1e293b" stroke-width="1"/>
  <g transform="translate(1050, 175)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="36" font-weight="800" fill="#06b6d4">1</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#64748b" dy="-8">句话</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#475569" dy="8">触发发布</text>
  </g>
  <line x1="1050" y1="193" x2="1180" y2="193" stroke="#1e293b" stroke-width="1"/>
  <g transform="translate(1050, 220)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="36" font-weight="800" fill="#8b5cf6">0</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#64748b" dy="-8">人工</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#475569" dy="8">干预发布</text>
  </g>
  <line x1="1050" y1="238" x2="1180" y2="238" stroke="#1e293b" stroke-width="1"/>
  <g transform="translate(1050, 265)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="36" font-weight="800" fill="#10b981">∞</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#64748b" dy="-8">内容</text>
    <text x="42" y="0" font-family="'PingFang SC', Arial, sans-serif" font-size="11" fill="#475569" dy="8">规模化生产</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="394" width="1280" height="6" fill="url(#accentH)" opacity="0.8"/>
</svg>
