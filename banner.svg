<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020817"/>
      <stop offset="60%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="ampGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="mblur"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="titleGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#8b5cf6" flood-opacity="0.55"/>
    </filter>
    <filter id="nodeGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.6"/>
    </filter>
    <filter id="agentGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#06b6d4" flood-opacity="0.5"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.25" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- Glow blobs -->
  <ellipse cx="180" cy="140" rx="260" ry="200" fill="url(#blob1)" filter="url(#gblur)"/>
  <ellipse cx="1100" cy="270" rx="280" ry="220" fill="url(#blob2)" filter="url(#gblur)"/>
  <ellipse cx="640" cy="200" rx="320" ry="240" fill="url(#blob3)" filter="url(#mblur)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accentH)" opacity="0.95"/>

  <!-- Decorative rings top-right -->
  <circle cx="1190" cy="75" r="95" fill="none" stroke="#6366f1" stroke-width="0.7" opacity="0.18"/>
  <circle cx="1190" cy="75" r="62" fill="none" stroke="#8b5cf6" stroke-width="0.7" opacity="0.22"/>
  <circle cx="1190" cy="75" r="32" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.28"/>
  <!-- Decorative rings bottom-left -->
  <circle cx="90" cy="345" r="65" fill="none" stroke="#06b6d4" stroke-width="0.7" opacity="0.18"/>
  <circle cx="90" cy="345" r="38" fill="none" stroke="#6366f1" stroke-width="0.7" opacity="0.22"/>

  <!-- ===== LEFT: Mini Multi-Agent diagram ===== -->
  <!-- Coordinator node -->
  <circle cx="148" cy="155" r="28" fill="#1e1b4b" filter="url(#nodeGlow)"/>
  <circle cx="148" cy="155" r="28" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="148" y="150" text-anchor="middle" font-size="14">🤖</text>
  <text x="148" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" font-weight="600">coordinator</text>

  <!-- Reviewer node -->
  <circle cx="80" cy="240" r="22" fill="#0c1a2e" filter="url(#agentGlow)"/>
  <circle cx="80" cy="240" r="22" fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <text x="80" y="235" text-anchor="middle" font-size="12">📝</text>
  <text x="80" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#67e8f9" font-weight="600">reviewer</text>

  <!-- Guard node -->
  <circle cx="216" cy="240" r="22" fill="#1a0f2e" filter="url(#agentGlow)"/>
  <circle cx="216" cy="240" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.7"/>
  <text x="216" y="235" text-anchor="middle" font-size="12">🛡️</text>
  <text x="216" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#c4b5fd" font-weight="600">guard</text>

  <!-- Memory node -->
  <circle cx="148" cy="310" r="18" fill="#0d1f14"/>
  <circle cx="148" cy="310" r="18" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.6"/>
  <text x="148" y="305" text-anchor="middle" font-size="10">💾</text>
  <text x="148" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6ee7b7" font-weight="600">memory</text>

  <!-- Connector lines -->
  <line x1="126" y1="178" x2="96" y2="220" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="170" y1="178" x2="200" y2="220" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="148" y1="183" x2="148" y2="292" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Hook labels -->
  <rect x="42" y="155" width="52" height="16" rx="8" fill="#0c2340" opacity="0.8"/>
  <rect x="42" y="155" width="52" height="16" rx="8" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.5"/>
  <text x="68" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#67e8f9">PreHook</text>
  <rect x="202" y="155" width="56" height="16" rx="8" fill="#1a0f2e" opacity="0.8"/>
  <rect x="202" y="155" width="56" height="16" rx="8" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <text x="230" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd">PostHook</text>

  <!-- Vertical divider -->
  <line x1="310" y1="60" x2="310" y2="340" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,6" opacity="0.6"/>

  <!-- ===== CENTER: Main title ===== -->
  <text x="700" y="168" text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="100" font-weight="900" letter-spacing="-3"
    fill="url(#ampGrad)" filter="url(#titleGlow)">AmpliPost</text>

  <!-- Divider line -->
  <rect x="390" y="188" width="620" height="1.5" rx="1" fill="url(#accentH)" opacity="0.45"/>

  <!-- Subtitle -->
  <text x="700" y="224" text-anchor="middle"
    font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="300" fill="#94a3b8" letter-spacing="5">Multi-Agent 智能营销中台</text>

  <!-- Tag pills -->
  <rect x="418" y="252" width="116" height="26" rx="13" fill="#6366f1" opacity="0.12"/>
  <rect x="418" y="252" width="116" height="26" rx="13" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="476" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a5b4fc" font-weight="600" letter-spacing="0.5">Multi-Agent</text>

  <rect x="546" y="252" width="96" height="26" rx="13" fill="#06b6d4" opacity="0.1"/>
  <rect x="546" y="252" width="96" height="26" rx="13" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <text x="594" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#67e8f9" font-weight="600" letter-spacing="0.5">Hooks 系统</text>

  <rect x="654" y="252" width="96" height="26" rx="13" fill="#10b981" opacity="0.1"/>
  <rect x="654" y="252" width="96" height="26" rx="13" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <text x="702" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6ee7b7" font-weight="600" letter-spacing="0.5">长期记忆</text>

  <rect x="762" y="252" width="80" height="26" rx="13" fill="#f43f5e" opacity="0.1"/>
  <rect x="762" y="252" width="80" height="26" rx="13" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.5"/>
  <text x="802" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fda4af" font-weight="600" letter-spacing="0.5">零人工干预</text>

  <rect x="854" y="252" width="96" height="26" rx="13" fill="#8b5cf6" opacity="0.1"/>
  <rect x="854" y="252" width="96" height="26" rx="13" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <text x="902" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c4b5fd" font-weight="600" letter-spacing="0.5">风控自适应</text>

  <!-- Platform row -->
  <text x="476" y="310" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#475569">🐟 闲鱼</text>
  <text x="594" y="310" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#475569">📕 小红书</text>
  <text x="702" y="310" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#475569">📺 B站</text>
  <text x="802" y="310" text-anchor="middle" font-family="'PingFang SC', Arial, sans-serif" font-size="13" fill="#475569">🎵 抖音</text>

  <!-- ===== RIGHT: Stats ===== -->
  <line x1="970" y1="60" x2="970" y2="340" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,6" opacity="0.6"/>

  <g transform="translate(990, 110)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="38" font-weight="800" fill="#818cf8">3</text>
    <text x="46" y="-6" font-family="'PingFang SC', Arial, sans-serif" font-size="12" fill="#64748b">个 Agent</text>
    <text x="46" y="10" font-family="'PingFang SC', Arial, sans-serif" font-size="10" fill="#475569">协同调度</text>
  </g>
  <line x1="990" y1="130" x2="1240" y2="130" stroke="#1e293b" stroke-width="1"/>
  <g transform="translate(990, 158)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="38" font-weight="800" fill="#22d3ee">2</text>
    <text x="46" y="-6" font-family="'PingFang SC', Arial, sans-serif" font-size="12" fill="#64748b">道 Hook</text>
    <text x="46" y="10" font-family="'PingFang SC', Arial, sans-serif" font-size="10" fill="#475569">发布前后拦截</text>
  </g>
  <line x1="990" y1="178" x2="1240" y2="178" stroke="#1e293b" stroke-width="1"/>
  <g transform="translate(990, 206)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="38" font-weight="800" fill="#c084fc">1</text>
    <text x="46" y="-6" font-family="'PingFang SC', Arial, sans-serif" font-size="12" fill="#64748b">句话触发</text>
    <text x="46" y="10" font-family="'PingFang SC', Arial, sans-serif" font-size="10" fill="#475569">全链路自动化</text>
  </g>
  <line x1="990" y1="226" x2="1240" y2="226" stroke="#1e293b" stroke-width="1"/>
  <g transform="translate(990, 254)">
    <text x="0" y="0" font-family="'SF Pro Display', Arial, sans-serif" font-size="38" font-weight="800" fill="#34d399">0</text>
    <text x="46" y="-6" font-family="'PingFang SC', Arial, sans-serif" font-size="12" fill="#64748b">次人工确认</text>
    <text x="46" y="10" font-family="'PingFang SC', Arial, sans-serif" font-size="10" fill="#475569">全程自主决策</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="394" width="1280" height="6" fill="url(#accentH)" opacity="0.85"/>
</svg>
